AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Phase 1 - Ingress API Gateway to SQS FIFO Infrastructure

Resources:
  # 1. SQS FIFO Queue
  OrderProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: OrderProcessingQueue.fifo
      FifoQueue: true
      ContentBasedDeduplication: true
      VisibilityTimeout: 30

  # 2. IAM Role allowing API Gateway to send messages to SQS
  ApiGatewaySqsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiSqsPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt OrderProcessingQueue.Arn

  # 3. REST API Gateway
  CheckoutApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      DefinitionBody:
        swagger: '2.0'
        info:
          title: Checkout Ingress API
          version: '1.0'
        paths:
          /checkout:
            post:
              summary: Submit an order
              consumes:
                - application/json
              produces:
                - application/json
              responses:
                '200':
                  description: Order received successfully
              x-amazon-apigateway-integration:
                credentials: !GetAtt ApiGatewaySqsRole.Arn
                httpMethod: POST
                type: aws
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${OrderProcessingQueue.QueueName}'
                requestTemplates:
                  application/json: 'Action=SendMessage&MessageBody=$util.urlEncode($input.body)&MessageGroupId=OrderGroupDefault'
                responses:
                  default:
                    statusCode: '200'
                    responseTemplates:
                      application/json: '{"status": "Order queued successfully", "messageId": "$input.path(''SendMessageResponse/SendMessageResult/MessageId'')"}'

  # --- PHASE 2 RESOURCES ---

  # 1. Payment Lambda Function
  PaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: payment.handler
      Runtime: nodejs20.x

  # 2. Inventory Lambda Function
  InventoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: inventory.handler
      Runtime: nodejs20.x

  # 3. Step Functions State Machine
  CheckoutStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      DefinitionUri: statemachine/checkout.asl.json
      DefinitionSubstitutions:
        PaymentFunctionArn: !GetAtt PaymentFunction.Arn
        InventoryFunctionArn: !GetAtt InventoryFunction.Arn
        EventBusName: !Ref OrderEventBus
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref PaymentFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref InventoryFunction
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref OrderEventBus

  # 4. SQS Consumer Lambda Function
  SqsConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers/sqs_consumer.handler
      Runtime: nodejs20.x
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref CheckoutStateMachine
      Policies:
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt CheckoutStateMachine.Name
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt OrderProcessingQueue.Arn
            BatchSize: 1

  # --- PHASE 3 RESOURCES ---

  # 1. Custom Event Bus
  OrderEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: OrderProcessingBus

  # 2. SNS Topic for Notifications
  OrderNotificationsTopic:
    Type: AWS::SNS::Topic

  # 3. SNS Email Subscription
  OrderNotificationSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderNotificationsTopic
      Protocol: email
      Endpoint: "thakur34980@gmail.com"

  # 4. EventBridge Rule to route OrderProcessed events to SNS
  OrderProcessedRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref OrderEventBus
      EventPattern:
        source:
          - checkout.workflow
        detail-type:
          - OrderProcessed
      State: ENABLED
      Targets:
        - Arn: !Ref OrderNotificationsTopic
          RoleArn: !GetAtt EventBridgeToSnsRole.Arn
          Id: OrderProcessedTarget

  # 5. IAM Role for EventBridge to publish to SNS
  EventBridgeToSnsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePublishToSnsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref OrderNotificationsTopic

Outputs:
  CheckoutApiUrl:
    Description: "API Gateway Endpoint URL for Checkout"
    Value: !Sub "https://${CheckoutApi}.execute-api.${AWS::Region}.amazonaws.com/prod/checkout"
  QueueUrl:
    Description: "SQS FIFO Queue URL"
    Value: !Ref OrderProcessingQueue
  QueueArn:
    Description: "SQS FIFO Queue ARN"
    Value: !GetAtt OrderProcessingQueue.Arn
  StateMachineArn:
    Description: "Step Functions State Machine ARN"
    Value: !Ref CheckoutStateMachine
  EventBusArn:
    Description: "Custom Event Bus ARN"
    Value: !GetAtt OrderEventBus.Arn
  OrderNotificationsTopicArn:
    Description: "SNS Topic ARN for Order Notifications"
    Value: !Ref OrderNotificationsTopic
