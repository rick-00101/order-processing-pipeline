AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Complete Event-Driven Order Processing Pipeline (Phases 1-4)

Resources:
  # ==========================================
  # PHASE 1: INGRESS (API GATEWAY & SQS FIFO)
  # ==========================================
  
  # 1. SQS FIFO Queue
  OrderProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: OrderProcessingQueue.fifo
      FifoQueue: true
      ContentBasedDeduplication: true
      VisibilityTimeout: 30

  # 2. IAM Role allowing API Gateway to send messages to SQS
  ApiGatewaySqsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiSqsPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt OrderProcessingQueue.Arn

  # 3. REST API Gateway with direct SQS FIFO Integration
  CheckoutApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      DefinitionBody:
        swagger: '2.0'
        info:
          title: Checkout Ingress API
          version: '1.0'
        paths:
          /checkout:
            post:
              summary: Submit an order
              consumes:
                - application/json
              produces:
                - application/json
              responses:
                '200':
                  description: Order received successfully
              x-amazon-apigateway-integration:
                credentials: !GetAtt ApiGatewaySqsRole.Arn
                httpMethod: POST
                type: aws
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${OrderProcessingQueue.QueueName}'
                requestTemplates:
                  application/json: |
                    Action=SendMessage&MessageBody=$util.urlEncode($input.body)&MessageGroupId=$input.path('$.orderId')
                responses:
                  default:
                    statusCode: '200'
                    responseTemplates:
                      application/json: |
                        {
                          "status": "Order queued successfully",
                          "messageId": "$input.path('//MessageId')"
                        }

  # ==========================================
  # PHASE 2: COMPUTE & ORCHESTRATION (LAMBDAS & STEP FUNCTIONS)
  # ==========================================

  # 4. Payment Lambda Function
  PaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: payment.handler
      Runtime: nodejs20.x

  # 5. Inventory Lambda Function
  InventoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: inventory.handler
      Runtime: nodejs20.x

  # 6. Step Functions State Machine
  CheckoutStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      DefinitionUri: statemachine/checkout.asl.json
      DefinitionSubstitutions:
        PaymentFunctionArn: !GetAtt PaymentFunction.Arn
        InventoryFunctionArn: !GetAtt InventoryFunction.Arn
        EventBusName: !Ref OrderEventBus
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref PaymentFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref InventoryFunction
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref OrderEventBus

  # 7. SQS Consumer Lambda Function (The Bridge)
  SqsConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: sqs_consumer.handler
      Runtime: nodejs20.x
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref CheckoutStateMachine
      Policies:
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt CheckoutStateMachine.Name
        - SQSPollerPolicy:
            QueueName: !GetAtt OrderProcessingQueue.QueueName
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt OrderProcessingQueue.Arn
            BatchSize: 1

  # ==========================================
  # PHASE 3: EVENT BROKERAGE & NOTIFICATIONS (EVENTBRIDGE & SNS)
  # ==========================================

  # 8. Custom Event Bus
  OrderEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: OrderProcessingBus

  # 9. SNS Topic for Email Notifications
  OrderNotificationsTopic:
    Type: AWS::SNS::Topic

  # 10. SNS Email Subscription
  OrderNotificationSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderNotificationsTopic
      Protocol: email
      Endpoint: "your-actual-email@example.com"

  # 11. EventBridge Rule to route OrderProcessed events to SNS
  EventBridgeToSNSRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref OrderEventBus
      EventPattern:
        source:
          - "checkout.workflow"
        detail-type:
          - "OrderProcessed"
      Targets:
        - Arn: !Ref OrderNotificationsTopic
          Id: "SNSTarget"

  # 12. Policy allowing EventBridge to publish to the SNS Topic
  EventBridgeToSNSPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref OrderNotificationsTopic
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref OrderNotificationsTopic

Outputs:
  CheckoutApiUrl:
    Description: "API Gateway Endpoint URL for Checkout"
    Value: !Sub "https://${CheckoutApi}.execute-api.${AWS::Region}.amazonaws.com/prod/checkout"
  QueueUrl:
    Description: "SQS FIFO Queue URL"
    Value: !Ref OrderProcessingQueue
  StateMachineArn:
    Description: "Step Functions State Machine ARN"
    Value: !Ref CheckoutStateMachine